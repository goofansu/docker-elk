version: '2'

services:
  elasticsearch:
    image: elasticsearch:2.4
    ports:
      - "9200:9200"

  kibana:
    image: kibana:4.6
    links:
      - elasticsearch
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "5601:5601"

  logstash:
    image: logstash:2.4
    links:
      - elasticsearch
    volumes:
      - ./:/config-dir
    command: [-f, /config-dir/logstash.conf]
    ports:
      - "10200:10200"
