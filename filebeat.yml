filebeat.prospectors:
- paths: ["/Users/james/work/faria/openapply/log/development.log"]
  tags: ["openapply"]
  multiline:
    pattern: '^(?:\[\S+\])?\W*Started'
    negate: true
    match: after
  fields:
    index: "openapply"

- paths: ["/Users/james/work/faria/openapply/log/lograge_development.log"]
  tags: ["openapply", "lograge"]
  fields:
    index: "openapply_lograge"

output:
  logstash:
    hosts: ["127.0.0.1:10200"]
