filebeat:
  prospectors:
    -
      input_type: stdin
      fields:
        server: game1
    -
      paths:
        - "*.log"
      fields:
        server: game2

  spool_size: 2048
  idle_timeout: 5s
  include_lines: ["OnSucSurrender", "TutorialPlayerChoice","NewPlayerFirstLogin","MissionCompleteID","Shop","ScriptFormatLog","AthleticsPlayerEnter","MinusDiamond","ComplateTask",
  "AddDiamond","EndData:","StartInstance","'Component:Buy","PlayerSkillToPos","PlayerSkillToTarget","backHome","UseHppotion",
"SmalldrogonBeKilled","BigdrogonBeKilled","RedbufferBeKilled","BulebufferBeKilled","EyeBorn","AddPoint","MinusPoint","MinusDiamond1"]

output:
  logstash:
    hosts: ["localhost"]
    index: hope
